name: Order Service CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Unit Tests
  # ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test -Dtest="*Test,*Tests,!*PactTest,!*ComponentTest" -DfailIfNoTests=true

      - name: Upload Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports/

  # ────────────────────────────────────────────────────────────
  # Stage 2: Pact Contract Tests
  # Checks out both services so provider verification can
  # load pact files generated by the other service's consumer.
  # ────────────────────────────────────────────────────────────
  pact-contract-tests:
    name: Pact Contract Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout order-service
        uses: actions/checkout@v4
        with:
          path: order-service

      # Required for provider pact verification — loads pact files
      # from product-service/target/pacts.
      # For private repos, set a CROSS_REPO_TOKEN secret with repo access.
      - name: Checkout product-service
        uses: actions/checkout@v4
        with:
          repository: boschtech/product-service
          path: product-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # Required for provider pact verification — loads pact files
      # from micro-frontend/pacts.
      - name: Checkout micro-frontend
        uses: actions/checkout@v4
        with:
          repository: boschtech/micro-frontend
          path: micro-frontend
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: |
            order-service/pom.xml
            product-service/pom.xml

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: micro-frontend/package-lock.json

      - name: Generate micro-frontend Consumer Pacts
        working-directory: micro-frontend
        run: npm ci && npm run test:contract

      - name: Run Consumer Pact Tests
        working-directory: order-service
        run: mvn test -Dtest="*ConsumerPactTest" -DfailIfNoTests=true

      - name: Generate product-service Consumer Pacts
        working-directory: product-service
        run: mvn test -Dtest="*ConsumerPactTest" -DfailIfNoTests=true

      - name: Run Provider Pact Verification
        working-directory: order-service
        run: mvn test -Dtest="*ProviderPactTest" -DfailIfNoTests=true

      - name: Upload Pact Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-test-reports
          path: |
            order-service/target/surefire-reports/
            order-service/target/pacts/

  # ────────────────────────────────────────────────────────────
  # Stage 3: Component Tests
  # Full Spring Boot application tests over HTTP.
  # ────────────────────────────────────────────────────────────
  component-tests:
    name: Component Tests
    needs: pact-contract-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Component Tests
        run: mvn test -Dtest="*ComponentTest" -DfailIfNoTests=true

      - name: Upload Component Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-test-reports
          path: target/surefire-reports/

  # ────────────────────────────────────────────────────────────
  # Stage 4: E2E Tests (@order-service) against a locally
  # deployed stack (product-service + order-service + micro-frontend)
  # running on the GitHub Actions runner.
  # ────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (@order-service)
    needs: component-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout order-service
        uses: actions/checkout@v4
        with:
          path: order-service

      - name: Checkout product-service
        uses: actions/checkout@v4
        with:
          repository: boschtech/product-service
          path: product-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout micro-frontend
        uses: actions/checkout@v4
        with:
          repository: boschtech/micro-frontend
          path: micro-frontend
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout ui-playwright-automation
        uses: actions/checkout@v4
        with:
          repository: boschtech/ui-playwright-automation
          path: ui-playwright-automation
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: |
            order-service/pom.xml
            product-service/pom.xml

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            micro-frontend/package-lock.json
            ui-playwright-automation/package-lock.json

      - name: Build order-service JAR
        working-directory: order-service
        run: mvn package -DskipTests -B

      - name: Build product-service JAR
        working-directory: product-service
        run: mvn package -DskipTests -B

      - name: Install micro-frontend deps
        working-directory: micro-frontend
        run: npm ci

      - name: Build micro-frontend
        working-directory: micro-frontend
        env:
          VITE_PRODUCT_SERVICE_URL: http://localhost:8080
          VITE_ORDER_SERVICE_URL: http://localhost:8081
        run: npm run build

      - name: Start product-service
        working-directory: product-service
        env:
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          ORDER_SERVICE_URL: http://localhost:8081
        run: |
          nohup java -jar target/*.jar > product-service.log 2>&1 &
          echo $! > /tmp/product-service.pid

      - name: Start order-service
        working-directory: order-service
        env:
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          PRODUCT_SERVICE_URL: http://localhost:8080
        run: |
          nohup java -jar target/*.jar > order-service.log 2>&1 &
          echo $! > /tmp/order-service.pid

      - name: Serve micro-frontend
        working-directory: micro-frontend
        run: |
          nohup npx --yes serve -s dist -l 3000 > micro-frontend.log 2>&1 &
          echo $! > /tmp/micro-frontend.pid

      - name: Wait for services to be healthy
        run: |
          wait_for() {
            local url=$1
            echo "Waiting for $url"
            for i in $(seq 1 60); do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $url is up"
                return 0
              fi
              sleep 2
            done
            echo "❌ Timed out waiting for $url"
            return 1
          }
          wait_for http://localhost:8080/actuator/health
          wait_for http://localhost:8081/actuator/health
          wait_for http://localhost:3000

      - name: Install Playwright deps
        working-directory: ui-playwright-automation
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-playwright-automation
        run: npx playwright install --with-deps

      - name: Run Order Service E2E Tests
        working-directory: ui-playwright-automation
        env:
          E2E_BASE_URL: http://localhost:3000
          CI: true
        run: npx playwright test --grep @order-service

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-playwright-automation/playwright-report/
          retention-days: 14

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: ui-playwright-automation/test-results/
          retention-days: 14

      - name: Upload Service Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            product-service/product-service.log
            order-service/order-service.log
            micro-frontend/micro-frontend.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          for pidfile in /tmp/product-service.pid /tmp/order-service.pid /tmp/micro-frontend.pid; do
            [ -f "$pidfile" ] && kill "$(cat "$pidfile")" 2>/dev/null || true
          done


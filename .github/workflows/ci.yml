name: Order Service CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Unit Tests
  # ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test -Dtest="*Test,*Tests,!*PactTest,!*ComponentTest" -DfailIfNoTests=true

      - name: Upload Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: target/surefire-reports/

  # ────────────────────────────────────────────────────────────
  # Stage 2: Pact Contract Tests
  # Checks out both services so provider verification can
  # load pact files generated by the other service's consumer.
  # ────────────────────────────────────────────────────────────
  pact-contract-tests:
    name: Pact Contract Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout order-service
        uses: actions/checkout@v4
        with:
          path: order-service

      # Required for provider pact verification — loads pact files
      # from product-service/target/pacts.
      # For private repos, set a CROSS_REPO_TOKEN secret with repo access.
      - name: Checkout product-service
        uses: actions/checkout@v4
        with:
          repository: boschtech/product-service
          path: product-service
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: |
            order-service/pom.xml
            product-service/pom.xml

      - name: Run Consumer Pact Tests
        working-directory: order-service
        run: mvn test -Dtest="*ConsumerPactTest" -DfailIfNoTests=true

      - name: Generate product-service Consumer Pacts
        working-directory: product-service
        run: mvn test -Dtest="*ConsumerPactTest" -DfailIfNoTests=true

      - name: Run Provider Pact Verification
        working-directory: order-service
        run: mvn test -Dtest="*ProviderPactTest" -DfailIfNoTests=true

      - name: Upload Pact Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pact-test-reports
          path: |
            order-service/target/surefire-reports/
            order-service/target/pacts/

  # ────────────────────────────────────────────────────────────
  # Stage 3: Component Tests
  # Full Spring Boot application tests over HTTP.
  # ────────────────────────────────────────────────────────────
  component-tests:
    name: Component Tests
    needs: pact-contract-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Component Tests
        run: mvn test -Dtest="*ComponentTest" -DfailIfNoTests=true

      - name: Upload Component Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-test-reports
          path: target/surefire-reports/

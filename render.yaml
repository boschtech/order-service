services:
  - type: web
    name: order-service
    runtime: docker
    repo: https://github.com/boschtech/order-service
    plan: free
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PRODUCT_SERVICE_URL
        sync: false
